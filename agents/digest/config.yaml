provider: anthropic/claude-sonnet-4-6
model_params:
  temperature: 0.3
  max_tokens: 2048
capabilities: []
policies:
  - base
memory:
  enabled: false
  namespace: digest
# Opt digest into the OpenAI-compatible /v1/chat/completions endpoint (Round 10).
# last user message -> DigestAgentInput.query ; DigestAgentOutput.result -> assistant content
chat:
  input_field: query
  output_field: result
